<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>HCP Customer Journey Map — Omnichannel Engagement Framework</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Source Sans 3','Segoe UI',sans-serif;background:#F8FAFB;color:#1F2937;min-height:100vh}
.header{background:linear-gradient(135deg,#0F172A,#1E293B);padding:26px 32px 20px}
.header-inner{max-width:1500px;margin:0 auto}
.header-label{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:#64748B;margin-bottom:3px}
.header h1{font-family:'Fraunces',Georgia,serif;font-size:22px;font-weight:700;color:#F1F5F9}
.container{max-width:1500px;margin:0 auto;padding:14px 20px 40px}
.seg-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center;justify-content:center}
.seg-btn{padding:10px 18px;border-radius:10px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:all .25s;background:#fff;border:1.5px solid #E2E8F0;position:relative;min-width:180px}
.seg-btn:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.1);border-color:#94A3B8}
.seg-btn:hover .seg-hint{opacity:1}
.seg-btn.active{border-width:2.5px;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.seg-btn.active .seg-hint{display:none}
.seg-dot{width:10px;height:10px;border-radius:50%;background:#CBD5E1;transition:all .25s}
.seg-title{font-size:13px;font-weight:700;color:#374151}
.seg-tag{font-size:9px;color:#64748B}
.seg-hint{font-size:8px;color:#94A3B8;font-weight:600;letter-spacing:.3px;opacity:.5;transition:opacity .2s;margin-top:1px}
.journey{background:#fff;border-radius:14px;border:1px solid #E2E8F0;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.03)}
.chevron-row{display:flex;height:40px}
.chevron-blank{width:130px;flex-shrink:0;background:#F1F5F9}
.chevron{flex:1;display:flex;align-items:center;justify-content:center}
.chevron span{font-size:11px;font-weight:700;color:#fff;letter-spacing:.3px}
.lane-row{display:flex}
.lane-label{width:130px;flex-shrink:0;padding:10px 8px;display:flex;flex-direction:column;justify-content:center;align-items:center;border-right:1px solid #E5E7EB;background:#F8FAFC}
.lane-badge{color:#fff;padding:5px 10px;border-radius:6px;font-size:11px;font-weight:700;text-align:center;line-height:1.3}
.lane-channels{margin-top:5px;display:flex;flex-direction:column;gap:1px;align-items:center}
.lane-channels span{font-size:8.5px;color:#6B7280}
.stage-cell{flex:1;padding:8px 6px;display:flex;flex-direction:column;justify-content:center}
.stage-cell+.stage-cell{border-left:1px dashed #E8ECF0}
.node{display:flex;align-items:center;gap:7px;padding:3px 0}
.node-circle{width:34px;height:34px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;border:2px solid}
.node-label{font-size:10.5px;font-weight:500;color:#374151;line-height:1.3}
.node-ch{font-size:8.5px;font-weight:600;opacity:.65}
.empty{font-size:10px;color:#D1D5DB;text-align:center;display:block}
.footer{margin-top:12px;text-align:center;font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:#94A3B8}
.lane-hl{border-top:2.5px solid #F59E0B;border-bottom:2.5px solid #F59E0B;background:#FFFBEB;position:relative}
.lane-hl .lane-label{background:#FEF3C7}
/* Signal arrows pointing into unified lane */
.signal-arrow{position:absolute;left:50%;transform:translateX(-50%);z-index:2}
.signal-arrow-top{top:-10px}
.signal-arrow-bottom{bottom:-10px}
/* Visited / Non-visited tags */
.v-tag{font-size:7px;font-weight:700;letter-spacing:.5px;padding:1px 4px;border-radius:2px;margin-top:1px;display:inline-block}
.v-tag-v{background:#D1FAE5;color:#059669}
.v-tag-nv{background:#FEE2E2;color:#DC2626}
.v-tag-all{background:#E0E7FF;color:#4F46E5}
/* Unified label extras */
.unified-why{margin-top:6px;padding:5px 6px;background:#FFF7ED;border:1px solid #FDBA74;border-radius:4px;font-size:7.5px;color:#9A3412;line-height:1.35;text-align:center}
.unified-signal{display:flex;flex-direction:column;gap:2px;margin-top:5px;align-items:center}
.unified-signal span{font-size:7px;color:#92400E;display:flex;align-items:center;gap:3px}
/* Convergence & fan-out bars */
.converge-bar{display:flex;align-items:center;position:relative;overflow:hidden}
.converge-bar .bar-label{width:130px;flex-shrink:0;display:flex;align-items:center;justify-content:center;padding:0 8px;background:#FFF7ED}
.converge-bar .bar-label span{font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#D97706}
.converge-bar .bar-arrows{flex:1;height:32px;position:relative;background:linear-gradient(180deg,transparent 0%,#FEF3C720 40%,#FEF3C750 50%,#FEF3C720 60%,transparent 100%)}
.fanout-bar .bar-arrows{background:linear-gradient(180deg,transparent 0%,#F1F5F920 40%,#F1F5F950 50%,#F1F5F920 60%,transparent 100%)}
/* Segment engagement model tags */
.seg-model{font-size:8px;font-weight:700;padding:2px 6px;border-radius:3px;margin-top:2px;display:inline-block;letter-spacing:.3px}
.seg-model-digital{background:#FEF2F2;color:#DC2626}
.seg-model-hybrid{background:#FFF7ED;color:#EA580C}
.seg-model-field{background:#F0FDF4;color:#16A34A}
/* Tracking tags on lane labels */
.tracking-tag{font-size:7px;font-weight:700;letter-spacing:.5px;padding:2px 5px;border-radius:3px;margin-top:4px;display:inline-block;text-transform:uppercase}
.tracking-agg{background:#FEF2F2;color:#B91C1C;border:1px solid #FECACA}
.tracking-pers{background:#EFF6FF;color:#1D4ED8;border:1px solid #BFDBFE}
/* Toggle slider */
.toggle-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding:10px 16px;background:#fff;border-radius:10px;border:1px solid #E2E8F0}
.toggle-left{display:flex;align-items:center;gap:8px}
.toggle-left-label{font-size:11px;font-weight:700;color:#1E293B}
.toggle-left-sub{font-size:9px;color:#64748B}
.toggle-switch{position:relative;width:48px;height:26px;background:#DC2626;border-radius:13px;cursor:pointer;transition:background .3s;flex-shrink:0}
.toggle-switch.on{background:#16A34A}
.toggle-knob{position:absolute;top:3px;left:3px;width:20px;height:20px;background:#fff;border-radius:50%;transition:left .3s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle-switch.on .toggle-knob{left:25px}
.toggle-labels{display:flex;gap:16px;align-items:center}
.toggle-lbl{font-size:10px;font-weight:600;padding:4px 10px;border-radius:5px;transition:all .3s}
.toggle-lbl-agg{background:#FEF2F2;color:#DC2626;border:1px solid #FECACA}
.toggle-lbl-ind{background:#F0FDF4;color:#16A34A;border:1px solid #BBF7D0}
.toggle-lbl.inactive{opacity:.35;border-color:#E5E7EB;background:#F8FAFC;color:#94A3B8}
/* Dimmed state for aggregated view */
.lane-dimmed{position:relative;opacity:1}
.lane-dimmed .stage-cell{opacity:.12;filter:grayscale(1)}
.lane-dimmed .lane-label{opacity:.5;filter:grayscale(.5)}
.dim-overlay{position:absolute;top:0;left:130px;right:0;bottom:0;display:flex;align-items:center;justify-content:center;z-index:5;pointer-events:none}
.dim-msg{background:rgba(255,255,255,.92);border:1.5px dashed #DC2626;border-radius:8px;padding:8px 16px;text-align:center}
.dim-msg-title{font-size:11px;font-weight:700;color:#DC2626;margin-bottom:3px}
.dim-msg-items{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.dim-msg-item{font-size:9px;color:#6B7280;display:flex;align-items:center;gap:3px}
.dim-msg-item b{color:#DC2626}
/* Converge bar dimmed */
.converge-dimmed{opacity:.15}
.fanout-dimmed{opacity:.15}
/* Feedback loop bar */
.feedback-bar{display:flex;align-items:center;position:relative;overflow:hidden}
.feedback-bar .bar-label{width:130px;flex-shrink:0;display:flex;align-items:center;justify-content:center;padding:0 8px;background:#FFF7ED}
.feedback-bar .bar-label span{font-size:7.5px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:#D97706;text-align:center;line-height:1.3}
.feedback-bar .bar-arrows{flex:1;height:36px;position:relative;background:linear-gradient(180deg,#FEF3C720 0%,#FEF3C740 50%,#FEF3C720 100%);border-top:1px dashed #FCD34D;border-bottom:1px dashed #FCD34D}
</style>
</head>

// ═══════ RENDER ═══════
let segIdx=0;
let isIndividual=true;

function toggleTracking(){
  isIndividual=!isIndividual;
  const sw=document.getElementById('toggleSwitch');
  const lblA=document.getElementById('lblAgg');
  const lblI=document.getElementById('lblInd');
  sw.classList.toggle('on',isIndividual);
  lblA.classList.toggle('inactive',isIndividual);
  lblI.classList.toggle('inactive',!isIndividual);
  render();
}

function render(){
  const seg=SEGS[segIdx];
  const data=J[seg.id];

  // Segment buttons with engagement model and CEI progression
  let sr='';
  SEGS.forEach((s,i)=>{
    const a=i===segIdx;
    sr+=`<button class="seg-btn ${a?'active':''}" style="border-color:${a?s.color:'#E2E8F0'};background:${a?s.color+'10':'#fff'}" onclick="segIdx=${i};render()">
      <div class="seg-dot" style="background:${a?s.color:'#CBD5E1'};${a?'box-shadow:0 0 0 3px '+s.color+'30':''}"></div>
      <div style="text-align:left">
        <div class="seg-title" style="color:${a?s.color:'#374151'}">${s.title}</div>
        ${s.tag?`<div class="seg-tag">${s.tag}</div>`:''}
        <div class="seg-model ${s.modelCls}">${s.model} — ${s.modelDesc}</div>
        ${a?'<div style="font-size:8px;color:'+s.color+';font-weight:700;margin-top:2px;letter-spacing:.5px">● ACTIVE JOURNEY</div>':'<div class="seg-hint">Click to view journey →</div>'}
      </div>
    </button>`;
    if(i<SEGS.length-1){
      sr+=`<div style="display:flex;flex-direction:column;align-items:center;gap:0;padding:0 2px">
        <svg width="56" height="36" viewBox="0 0 56 36">
          <defs><marker id="ah${i}" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto"><path d="M0 0L5 2.5L0 5z" fill="#D97706"/></marker>
          <marker id="ah${i}r" markerWidth="5" markerHeight="5" refX="1" refY="2.5" orient="auto"><path d="M5 0L0 2.5L5 5z" fill="#94A3B8"/></marker></defs>
          <path d="M4 13 C 18 3, 38 3, 52 13" stroke="#D97706" stroke-width="1.5" fill="none" marker-end="url(#ah${i})"/>
          <path d="M52 24 C 38 34, 18 34, 4 24" stroke="#94A3B8" stroke-width="1" fill="none" stroke-dasharray="3 2" marker-end="url(#ah${i}r)"/>
        </svg>
        <div style="font-size:7.5px;font-weight:700;color:#D97706;letter-spacing:.5px;white-space:nowrap;margin-top:-4px">CEI Score</div>
      </div>`;
    }
  });
  document.getElementById('segRow').innerHTML=sr;

  // Chevrons
  let ch=`<div class="chevron-blank"></div>`;
  STAGES.forEach((s,i)=>{
    const cp=i===0
      ?'polygon(0 0,calc(100% - 14px) 0,100% 50%,calc(100% - 14px) 100%,0 100%)'
      :i===STAGES.length-1
        ?'polygon(14px 0,100% 0,100% 100%,0 100%,14px 50%)'
        :'polygon(14px 0,calc(100% - 14px) 0,100% 50%,calc(100% - 14px) 100%,0 100%,14px 50%)';
    ch+=`<div class="chevron" style="background:${seg.color};clip-path:${cp};margin-left:${i>0?'-1px':'0'}"><span>${s.title}</span></div>`;
  });

  // Render a lane row
  function renderLane(lane, li, totalInGroup) {
    const hl=lane.hl;
    const lc=hl?'#D97706':lane.color;
    const bg=hl?'#FEF3C7':lc+'12';
    const shouldDim=false; // Unified lane always stays visible
    const rowCls=hl?'lane-row lane-hl':'lane-row';
    const rowStyle=!hl?`border-top:1px dashed #E5E7EB;background:${li%2===0?'#FAFBFC':'#fff'}`:'';

    const trackingTag=lane.tracking==='aggregated'
      ?'<div class="tracking-tag tracking-agg">Aggregated Tracking</div>'
      :'<div class="tracking-tag tracking-pers" style="position:relative">'
        +((!isIndividual && hl)?'<span style="position:absolute;top:-2px;right:-2px;left:-2px;bottom:-2px;display:flex;align-items:center;justify-content:center;font-size:14px;color:#DC2626;font-weight:900;pointer-events:none">✕</span>':'')
        +'Personalised Tracking</div>';

    const unifiedWhy=hl?`<div class="unified-why" style="position:relative">`
      +((!isIndividual)?'<span style="position:absolute;top:-2px;right:-2px;left:-2px;bottom:-2px;display:flex;align-items:center;justify-content:center;font-size:18px;color:#DC2626;font-weight:900;pointer-events:none;background:rgba(255,255,255,.5);border-radius:4px">✕</span>':'')
      +`All channels converge<br>into <b>1:1 HCP profile</b><br>for personalised experience</div>`:'';

    let label=`<div class="lane-label" ${hl?'style="background:#FEF3C7"':''}>
      <div class="lane-badge" style="background:${lane.color}">${hl?'🌐 ':''}${lane.label}</div>
      ${trackingTag}
      <div class="lane-channels">${lane.channels.map(c=>`<span>${c}</span>`).join('')}</div>
      ${unifiedWhy}
    </div>`;

    let cells='';
    STAGES.forEach((stage,si)=>{
      const items=data[stage.id][lane.id]||[];
      let inner='';
      if(items.length>0){
        items.forEach(it=>{
          const nvLabel=seg.id==='seg3'?'NON-TARGETED':'NON-VISITED';
          const tagHtml=(!hl && it.t)?`<span class="v-tag v-tag-${it.t}">${it.t==='v'?'VISITED':it.t==='nv'?nvLabel:'ALL HCPs'}</span>`:'';
          const chHtml=(!hl && it.c)?`<span class="node-ch" style="color:${lc}">${it.c}</span>`:'';
          inner+=`<div class="node">
            <div class="node-circle" style="border-color:${lc};background:${bg};box-shadow:0 1px 4px ${lc}18">${icon(it.i,lc)}</div>
            <div><div class="node-label">${it.l}</div>${chHtml} ${tagHtml}</div>
          </div>`;
        });
      } else {
        inner='<span class="empty">—</span>';
      }
      cells+=`<div class="stage-cell" style="min-height:${lane.minH}px">${inner}</div>`;
    });

    return `<div class="${rowCls}" style="${rowStyle};position:relative">${label}${cells}</div>`;
  }

  // Build convergence arrow SVG bar
  function arrowBar(direction, colors, labelText, labelColor, bgClass) {
    const numCols=6;
    let arrows='';
    for(let i=0;i<numCols;i++){
      const x=((i+0.5)/numCols*100);
      const col=colors[i % colors.length];
      if(direction==='down'){
        arrows+=`<svg style="position:absolute;left:${x}%;top:0;transform:translateX(-50%)" width="24" height="32" viewBox="0 0 24 32">
          <path d="M12 2 L12 24" stroke="${col}" stroke-width="2" stroke-dasharray="3 3" opacity="0.5"/>
          <path d="M7 20 L12 28 L17 20" stroke="${col}" stroke-width="1.5" fill="${col}" fill-opacity="0.2" opacity="0.6"/>
        </svg>`;
      } else {
        arrows+=`<svg style="position:absolute;left:${x}%;top:0;transform:translateX(-50%)" width="24" height="32" viewBox="0 0 24 32">
          <path d="M12 30 L12 8" stroke="${col}" stroke-width="2" stroke-dasharray="3 3" opacity="0.5"/>
          <path d="M7 12 L12 4 L17 12" stroke="${col}" stroke-width="1.5" fill="${col}" fill-opacity="0.2" opacity="0.6"/>
        </svg>`;
      }
    }
    return `<div class="converge-bar ${bgClass||''}">
      <div class="bar-label"><span style="color:${labelColor}">${labelText}</span></div>
      <div class="bar-arrows">${arrows}</div>
    </div>`;
  }

  // Assemble lanes
  let inLanes='';
  LANES_IN.forEach((lane,li)=>{ inLanes+=renderLane(lane,li); });

  const convergeColors=['#8B5CF6','#EC4899','#6366F1','#16A34A','#8B5CF6','#EC4899'];
  // Custom converge bar with crosses in aggregated mode
  let convArrows='';
  for(let i=0;i<6;i++){
    const x=((i+0.5)/6*100);
    const col=convergeColors[i%convergeColors.length];
    convArrows+=`<svg style="position:absolute;left:${x}%;top:0;transform:translateX(-50%)" width="24" height="32" viewBox="0 0 24 32">
      <path d="M12 2 L12 24" stroke="${col}" stroke-width="2" stroke-dasharray="3 3" opacity="0.5"/>
      <path d="M7 20 L12 28 L17 20" stroke="${col}" stroke-width="1.5" fill="${col}" fill-opacity="0.2" opacity="0.6"/>
      ${!isIndividual?`<line x1="4" y1="8" x2="20" y2="22" stroke="#DC2626" stroke-width="2.5" opacity="0.8"/><line x1="20" y1="8" x2="4" y2="22" stroke="#DC2626" stroke-width="2.5" opacity="0.8"/>`:''}
    </svg>`;
  }
  const convergeBar=`<div class="converge-bar">
    <div class="bar-label"><span style="color:#D97706">▼ SIGNALS CONVERGE</span></div>
    <div class="bar-arrows">${convArrows}</div>
  </div>`;

  const ueLane=renderLane(LANE_UE,0);

  // Feedback loop bar — web insights flowing back up to all channels
  const fbChannels=[
    {label:'Retargeting',color:'#8B5CF6'},
    {label:'Social targeting',color:'#EC4899'},
    {label:'Email / SMS personalisation',color:'#6366F1'},
    {label:'P2P recommendations',color:'#16A34A'},
  ];
  let fbArrows='';
  for(let i=0;i<6;i++){
    const x=((i+0.5)/6*100);
    const fc=convergeColors[i%convergeColors.length];
    fbArrows+=`<svg style="position:absolute;left:${x}%;top:0;transform:translateX(-50%)" width="24" height="36" viewBox="0 0 24 36">
      <path d="M12 32 L12 10" stroke="${fc}" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.45"/>
      <path d="M7 14 L12 6 L17 14" stroke="${fc}" stroke-width="1.3" fill="${fc}" fill-opacity="0.15" opacity="0.5"/>
      ${!isIndividual?`<line x1="4" y1="10" x2="20" y2="26" stroke="#DC2626" stroke-width="2.5" opacity="0.8"/><line x1="20" y1="10" x2="4" y2="26" stroke="#DC2626" stroke-width="2.5" opacity="0.8"/>`:''}
    </svg>`;
  }
  // Add small feedback labels across the bar
  let fbLabels='';
  fbChannels.forEach((fb,i)=>{
    const x=10+i*22;
    fbLabels+=`<div style="position:absolute;top:50%;left:${x}%;transform:translate(-50%,-50%);font-size:7px;font-weight:600;color:${fb.color};background:rgba(255,255,255,.85);padding:1px 4px;border-radius:2px;white-space:nowrap;border:1px solid ${fb.color}30">${fb.label}</div>`;
  });
  const feedbackBar=`<div class="feedback-bar">
    <div class="bar-label"><span style="color:#D97706">▲ WEB INSIGHTS<br>FEED BACK</span></div>
    <div class="bar-arrows">${fbArrows}${fbLabels}</div>
  </div>`;

  const fanoutBar=arrowBar('up',['#64748B','#64748B','#64748B','#64748B','#64748B','#64748B'],'▼ ORCHESTRATED ACTIONS','#64748B','fanout-bar');

  let outLanes='';
  LANES_OUT.forEach((lane,li)=>{ outLanes+=renderLane(lane,li); });

  const journeyEl=document.getElementById('journey');
  journeyEl.innerHTML=`<div style="position:relative"><div class="chevron-row">${ch}</div>${inLanes}${convergeBar}${ueLane}${feedbackBar}${fanoutBar}${outLanes}<div id="flowOverlay" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1"></div></div>`;

  // Draw flow lines after layout
  requestAnimationFrame(()=>{
    const container=journeyEl.querySelector('[style*="position:relative"]');
    const w=container.offsetWidth;
    const h=container.offsetHeight;
    const oL=130; // lane label width
    const oT=40;  // chevron height
    const cW=w-oL;
    const cH=h-oT;
    // Two gentle flowing curves across the journey
    const svg=`<svg width="${w}" height="${h}" style="position:absolute;top:0;left:0;pointer-events:none">
      <path d="M${oL+cW*0.03} ${oT+cH*0.1} C ${oL+cW*0.12} ${oT+cH*0.06},${oL+cW*0.18} ${oT+cH*0.22},${oL+cW*0.22} ${oT+cH*0.2} S ${oL+cW*0.32} ${oT+cH*0.35},${oL+cW*0.38} ${oT+cH*0.32} S ${oL+cW*0.5} ${oT+cH*0.22},${oL+cW*0.55} ${oT+cH*0.4} S ${oL+cW*0.65} ${oT+cH*0.55},${oL+cW*0.72} ${oT+cH*0.48} S ${oL+cW*0.82} ${oT+cH*0.35},${oL+cW*0.88} ${oT+cH*0.52} S ${oL+cW*0.94} ${oT+cH*0.65},${oL+cW*0.98} ${oT+cH*0.58}" stroke="${seg.color}" stroke-width="1.5" fill="none" stroke-dasharray="5 5" opacity="0.15"/>
      <path d="M${oL+cW*0.02} ${oT+cH*0.3} C ${oL+cW*0.1} ${oT+cH*0.35},${oL+cW*0.2} ${oT+cH*0.5},${oL+cW*0.25} ${oT+cH*0.45} S ${oL+cW*0.35} ${oT+cH*0.58},${oL+cW*0.42} ${oT+cH*0.55} S ${oL+cW*0.52} ${oT+cH*0.65},${oL+cW*0.58} ${oT+cH*0.6} S ${oL+cW*0.68} ${oT+cH*0.5},${oL+cW*0.75} ${oT+cH*0.68} S ${oL+cW*0.85} ${oT+cH*0.78},${oL+cW*0.9} ${oT+cH*0.72} S ${oL+cW*0.95} ${oT+cH*0.62},${oL+cW*0.98} ${oT+cH*0.75}" stroke="${seg.color}" stroke-width="1.5" fill="none" stroke-dasharray="5 5" opacity="0.1"/>
    </svg>`;
    document.getElementById('flowOverlay').innerHTML=svg;
  });
  document.getElementById('footer').textContent=`Personalised Omnichannel Messaging — ${seg.title} Journey`;
}
render();
</script>
